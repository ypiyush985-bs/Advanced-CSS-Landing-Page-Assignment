<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coca-Cola </title>
  <link rel="stylesheet" href="CSS Landing Page.css">
</head>
<body class="coke">

  <input type="checkbox" id="theme-switch" class="coke__state">

  <header class="nav">
    <div class="nav__logo">Coca-Cola</div>
    <label for="theme-switch" class="nav__btn">Switch to Zero</label>
  </header>

  <main>
    <section class="hero">
      <h1 class="hero__headline">Real Magic.</h1>
      <p class="hero__subtext">A simple idea, a secret formula, and a promise of happiness.</p>
    </section>

    <section class="showcase">
      <div class="item">
        <h3 class="item__name">The Original</h3>
        <p class="item__desc">The classic taste since 1886.</p>
      </div>
      <div class="item item--featured">
        <h3 class="item__name">Zero Sugar</h3>
        <p class="item__desc">Great Coke taste, zero calories.</p>
      </div>
      <div class="item">
        <h3 class="item__name">Diet Coke</h3>
        <p class="item__desc">Light, crisp, and refreshing.</p>
      </div>
    </section>

    <footer class="footer">
      <button class="footer__cta">Shop Now</button>
    </footer>
  </main>

</body>
</html>
